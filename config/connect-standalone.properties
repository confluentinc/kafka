# These are defaults. This file just demonstrates how to override some settings.
bootstrap.servers=localhost:9092

# The converters specify the format of data in Kafka and how to translate it into Connect data. Every Connect user will
# need to configure these based on the format they want their data in when loaded from or stored into Kafka
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
# Converter-specific settings can be passed in by prefixing the Converter's setting with the converter we want to apply
# it to
key.converter.schemas.enable=true
value.converter.schemas.enable=true

offset.storage.file.filename=/tmp/connect.offsets
# Flush much faster than normal, which is useful for testing/debugging
offset.flush.interval.ms=10000

# Set to a list of filesystem paths separated by commas (,) to enable class loading isolation for plugins
# (connectors, converters, transformations). A path may be a plugin archive (JAR or ZIP), or a directory
# containing plugins. When the path is a directory, each direct child directory or archive is loaded
# separately and may be:
# a) a directory containing JARs or ZIPs with plugins and their dependencies
# b) an uber-jar with plugins and their dependencies
# c) a directory containing the package directory structure of classes of plugins and their dependencies
# Each direct child directory is scanned recursively, so archives, classes and dependencies may be located in
# nested subdirectories. Multiple plugins placed under the same direct child directory share the same
# class loader. For class loading isolation, place each plugin and its dependencies in its own direct
# child directory under a path listed in plugin.path. Symlinks will be followed to discover dependencies
# or plugins.
# Examples:
# plugin.path=/usr/local/share/java,/usr/local/share/kafka/plugins,/opt/connectors,
# With plugin.path=/opt/connectors, place each plugin in its own direct child of /opt/connectors.
# A plugin can be a directory such as /opt/connectors/my-plugin/ (dependencies may be nested,
# e.g. /opt/connectors/my-plugin/lib/dep.jar), or an uber-jar such as /opt/connectors/another-plugin.jar.
#plugin.path=
